<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru Kutusu (TYT - AYT) - Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col pb-10 transition-colors duration-200">

    <section id="auth-section" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 dark:border-slate-700">
            <h1 class="text-3xl font-extrabold text-center text-indigo-600 dark:text-indigo-400 mb-6">📚 Soru Kutusu</h1>
            
            <div id="login-form">
                <h2 class="text-xl font-bold mb-4">Giriş Yap</h2>
                <input type="email" id="login-email" placeholder="E-posta" class="w-full mb-3 p-3 rounded-lg bg-slate-50 dark:bg-slate-700 border dark:border-slate-600">
                <input type="password" id="login-pass" placeholder="Şifre" class="w-full mb-4 p-3 rounded-lg bg-slate-50 dark:bg-slate-700 border dark:border-slate-600">
                <button onclick="window.loginUser()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700">Giriş Yap</button>
                <p class="text-sm text-center mt-4 text-slate-500">Hesabın yok mu? <button onclick="window.toggleAuth('register')" class="text-indigo-500 font-bold">Kayıt Ol</button></p>
            </div>

            <div id="register-form" class="hidden">
                <h2 class="text-xl font-bold mb-4">Kayıt Ol</h2>
                <input type="text" id="reg-username" placeholder="Kullanıcı Adı" class="w-full mb-3 p-3 rounded-lg bg-slate-50 dark:bg-slate-700 border dark:border-slate-600">
                <input type="email" id="reg-email" placeholder="E-posta" class="w-full mb-3 p-3 rounded-lg bg-slate-50 dark:bg-slate-700 border dark:border-slate-600">
                <input type="password" id="reg-pass" placeholder="Şifre" class="w-full mb-4 p-3 rounded-lg bg-slate-50 dark:bg-slate-700 border dark:border-slate-600">
                <button onclick="window.registerUser()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-lg hover:bg-emerald-600">Kayıt Ol</button>
                <p class="text-sm text-center mt-4 text-slate-500">Zaten hesabın var mı? <button onclick="window.toggleAuth('login')" class="text-indigo-500 font-bold">Giriş Yap</button></p>
            </div>
        </div>
    </section>

    <div id="app-container" class="hidden flex-col flex-grow">
        <header class="bg-indigo-600 dark:bg-indigo-950 text-white py-4 px-6 shadow-md flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-bold tracking-wide cursor-pointer flex items-center gap-2" onclick="window.showMainCategories()">📚 Anasayfa</h1>
            <div class="flex items-center space-x-3">
                <button onclick="window.showLeaderboard()" class="bg-yellow-500 text-white font-bold px-3 py-2 rounded-lg text-sm hover:bg-yellow-600">🏆 Sıralama</button>
                <button onclick="window.logoutUser()" class="bg-red-500 text-white font-bold px-3 py-2 rounded-lg text-sm hover:bg-red-600">Çıkış</button>
            </div>
        </header>

        <main class="flex-grow p-4 md:p-6 max-w-5xl mx-auto w-full">
            <section id="main-categories" class="space-y-8">
                <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-md border border-slate-100 dark:border-slate-700 flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100">Merhaba, <span id="display-username" class="text-indigo-500"></span>! 👋</h2>
                        <p class="text-sm text-slate-500 mt-1">Bugün saat 04:00'ten bu yana: <strong id="card-daily" class="text-indigo-600 dark:text-indigo-400">0</strong> soru</p>
                    </div>
                    <button onclick="window.syncQuestionsToCloud()" class="bg-indigo-600 text-white font-bold py-2 px-4 rounded-xl shadow hover:bg-indigo-700">☁️ Kaydet</button>
                </div>
                <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-md border">
                    <textarea id="study-diary" oninput="window.analyzeDiary()" class="w-full h-32 p-4 border rounded-xl bg-slate-50 dark:bg-slate-900" placeholder="Örn: Matematik 40 soru, Türkçe 20 soru çözdüm."></textarea>
                    <p id="local-calc-badge" class="text-xs text-indigo-500 mt-2 font-bold">Yeni Çözülen: 0</p>
                </div>
            </section>

            <section id="leaderboard-section" class="hidden space-y-6">
                <button onclick="window.showMainCategories()" class="text-indigo-600 font-semibold">&larr; Geri</button>
                <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-md border">
                    <table class="w-full text-left">
                        <tbody id="leaderboard-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Senin Bilgilerin Buraya Eklendi
        const firebaseConfig = {
            apiKey: "AIzaSyAkPM0K52M7V5MgUCf5SmSvGlQjP5FJ4wQ",
            authDomain: "yks-takip-sistemi-a733e.firebaseapp.com",
            projectId: "yks-takip-sistemi-a733e",
            storageBucket: "yks-takip-sistemi-a733e.appspot.com",
            messagingSenderId: "670248896860",
            appId: "1:670248896860:web:ba920d610ce57b4762d999"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = null;
        let localUnsavedQuestions = 0;

        window.toggleAuth = (type) => {
            document.getElementById('login-form').classList.toggle('hidden', type !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', type !== 'register');
        }

        window.hideAllSections = () => {
            document.getElementById('main-categories').classList.add('hidden');
            document.getElementById('leaderboard-section').classList.add('hidden');
        }

        window.showMainCategories = () => {
            window.hideAllSections();
            document.getElementById('main-categories').classList.remove('hidden');
        }

        window.showLeaderboard = async () => {
            window.hideAllSections();
            document.getElementById('leaderboard-section').classList.remove('hidden');
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '<tr><td class="p-4">Yükleniyor...</td></tr>';
            
            const q = query(collection(db, "users"), orderBy("dailyQuestions", "desc"), limit(20));
            const snapshot = await getDocs(q);
            tbody.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `<tr><td class="p-4">${data.username}</td><td class="p-4 font-bold text-indigo-600">${data.dailyQuestions} Soru</td></tr>`;
            });
        }

        window.registerUser = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const username = document.getElementById('reg-username').value;
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            await updateProfile(userCredential.user, { displayName: username });
            await setDoc(doc(db, "users", userCredential.user.uid), { username, dailyQuestions: 0, lastResetDate: Date.now() });
        }

        window.loginUser = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            await signInWithEmailAndPassword(auth, email, pass);
        }

        window.logoutUser = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('flex');
                document.getElementById('display-username').innerText = user.displayName;
                const docSnap = await getDoc(doc(db, "users", user.uid));
                userData = docSnap.data();
                document.getElementById('card-daily').innerText = userData.dailyQuestions;
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        window.analyzeDiary = () => {
            const text = document.getElementById('study-diary').value;
            const matches = text.match(/(\d+)\s*soru/gi);
            localUnsavedQuestions = matches ? matches.reduce((sum, m) => sum + parseInt(m), 0) : 0;
            document.getElementById('local-calc-badge').innerText = `Yeni Çözülen: ${localUnsavedQuestions}`;
        }

        window.syncQuestionsToCloud = async () => {
            if(localUnsavedQuestions > 0) {
                await updateDoc(doc(db, "users", currentUser.uid), { dailyQuestions: increment(localUnsavedQuestions) });
                alert("Başarıyla kaydedildi!");
                location.reload();
            }
        }
    </script>
</body>
</html>
